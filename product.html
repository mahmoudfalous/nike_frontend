<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Stylish</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="file.css">
</head>

<body class="catalog-page">
  <nav>
    <div class="logo"><a href="file.html">Styli<span>sh</span></a></div>
    <ul class="nav-links">
      <li><a href="file.html">Home</a></li>
      <li><a href="category.html?slug=men">Men</a></li>
      <li><a href="category.html?slug=women">Women</a></li>
      <li><a href="category.html?slug=kids">Kids</a></li>
      <li><a href="orders.html">Orders</a></li>
    </ul>
    <div class="nav-auth" data-site-auth></div>
  </nav>

  <main class="catalog-shell">
    <section class="breadcrumb-bar">
      <a href="file.html">Home</a>
      <span>›</span>
      <a href="category.html?slug=all">Products</a>
      <span>›</span>
      <span data-breadcrumb-current>Product</span>
    </section>

    <section class="product-detail" data-product-shell>
      <div class="product-media skeleton-box"></div>
      <div class="product-info skeleton-box"></div>
    </section>

    <section class="catalog-section">
      <div class="section-header">
        <h2>Related Products</h2>
        <a href="category.html?slug=all">Browse all</a>
      </div>
      <div class="products-grid related-grid" data-related-grid></div>
    </section>

    <section class="catalog-section admin-panel" data-admin-panel hidden>
      <div class="section-header">
        <h2>Admin Product Controls</h2>
        <a href="#">Manage inventory</a>
      </div>
      <div class="admin-grid">
        <form class="admin-form" data-admin-update-form>
          <h3>Update product</h3>
          <div class="auth-field"><label>Name</label><input type="text" name="name"></div>
          <div class="auth-field"><label>Price</label><input type="number" step="0.01" name="price"></div>
          <div class="auth-field"><label>Stock</label><input type="number" name="stock"></div>
          <div class="auth-field"><label>Description</label><textarea name="description"></textarea></div>
          <button class="btn-primary auth-submit" type="submit">Save Changes</button>
        </form>
        <div class="admin-form admin-danger">
          <h3>Danger zone</h3>
          <p>Use this only when you want to remove the current product from the catalog.</p>
          <button class="btn-primary auth-submit" type="button" data-delete-product>Delete Product</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">
    <span>✓</span>
    <span id="toastMsg">Ready</span>
  </div>

  <script src="site.js"></script>
  <script src="product.js"></script>
</body>

</html>
