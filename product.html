<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Stylish Nike Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="file.css">
</head>
<body class="catalog-page">
<nav>
  <div class="logo"><a href="file.html">Styli<span>sh</span></a></div>
  <ul class="nav-links">
    <li><a href="file.html">Home</a></li>
    <li><a href="category.html?slug=men">Men</a></li>
    <li><a href="category.html?slug=women">Women</a></li>
    <li><a href="category.html?slug=kids">Kids</a></li>
    <li><a href="category.html?slug=sports">Sports</a></li>
    <li><a href="category.html?slug=sale" style="color: #ff4d4d;">Sale</a></li>
  </ul>
  <div class="nav-auth" data-site-auth></div>
  <div class="nav-icons">
    <button title="Cart" id="cartBtn" style="position:relative;">🛒
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<main class="catalog-shell">
  <section class="breadcrumb-bar">
    <a href="file.html">Home</a>
    <span>›</span>
    <a href="category.html?slug=all">Products</a>
    <span>›</span>
    <span data-breadcrumb-current>Loading...</span>
  </section>

  <section class="product-detail" data-product-shell>
    <div class="product-media skeleton-box"></div>
    <div class="product-info skeleton-box"></div>
  </section>

  <section class="catalog-section admin-panel" data-admin-panel hidden>
    <div class="section-header">
      <h2>Admin Product Controls</h2>
    </div>
    <div class="admin-grid">
      <form class="admin-form" data-admin-update-form>
        <h3>Update Product Data</h3>
        <div class="auth-field">
          <label>Product Name</label>
          <input type="text" name="name" placeholder="e.g. Nike Air Max">
        </div>
        <div class="auth-field">
          <label>Price ($)</label>
          <input type="number" step="0.01" name="price">
        </div>
        <div class="auth-field">
          <label>Stock Quantity</label>
          <input type="number" name="stock">
        </div>
        <div class="auth-field">
          <label>Image URL</label>
          <input type="text" name="image_url">
        </div>
        <div class="auth-field">
          <label>Description</label>
          <textarea name="description"></textarea>
        </div>
        <button class="btn-primary auth-submit" type="submit">Save Changes</button>
      </form>

      <div class="admin-form admin-danger">
        <h3>Danger Zone</h3>
        <p>Remove this product from the database permanently.</p>
        <button class="btn-primary auth-submit" type="button" data-delete-product>Delete Product</button>
      </div>
    </div>
  </section>
</main>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>Shopping Cart</h3>
    <button class="cart-close" id="cartClose">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="icon">🛒</div>
      <p>Your cart is empty</p>
    </div>
  </div>
  <div class="cart-footer" id="cartFooter" style="display:none;">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">$0.00</span>
    </div>
    <button class="btn-checkout" id="cartCheckoutBtn">Proceed to Checkout →</button>
  </div>
</div>

<div class="toast" id="toast">
  <span>✓</span>
  <span id="toastMsg">Ready</span>
</div>

<script src="site.js"></script>
<script src="product.js"></script>
</body>
</html>
